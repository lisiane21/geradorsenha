<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Senhas Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<h1>🔒 Gerador de Senhas</h1>

<div class="senha-box">

<input
type="text"
id="senha"
placeholder="Sua senha aparecerá aqui"
readonly>

<button id="copiar">
📋 Copiar
</button>

</div>

<div class="config">

<label>Tamanho:
<span id="valor">16</span>
</label>

<input
type="range"
id="tamanho"
min="4"
max="50"
value="16">

<label>
<input type="checkbox" id="maiusculas" checked>
Letras Maiúsculas
</label>

<label>
<input type="checkbox" id="minusculas" checked>
Letras Minúsculas
</label>

<label>
<input type="checkbox" id="numeros" checked>
Números
</label>

<label>
<input type="checkbox" id="simbolos" checked>
Símbolos
</label>

<button id="gerar">
Gerar Nova Senha
</button>

</div>

<div class="forca">

<h3>Força da senha</h3>

<div class="barra">

<div id="nivel"></div>

</div>

<p id="textoForca">Muito Fraca</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
